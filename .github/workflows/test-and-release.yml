name: Test and Release

on:
    push:
        branches:
            - main
        tags:
            - 'v*'
    pull_request: {}

jobs:
    lint:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: '18'
            - run: npm install
            - run: npm run lint

    test-js:
        runs-on: ${{ matrix.os }}
        strategy:
            matrix:
                node-version: [18.x, 20.x]
                os: [ubuntu-latest]
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: ${{ matrix.node-version }}
            - run: npm install
            - run: npm run test:package
            - run: npm run test:unit

    # Release-Job deaktiviert: erfordert ein npm Automation-Token als Repo-Secret
    # NPM_TOKEN (siehe https://docs.npmjs.com/creating-and-viewing-access-tokens,
    # Token-Typ "Automation" oder Granular Access Token mit "Bypass 2FA" - der
    # normale Login-Passkey funktioniert in CI nicht interaktiv). Sobald das
    # Secret gesetzt ist, den folgenden Block einkommentieren:
