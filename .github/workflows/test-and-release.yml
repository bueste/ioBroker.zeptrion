name: Test and Release

# Run this job on all pushes and pull requests
# as well as tags with a semantic version
on:
    push:
        branches:
            - '*'
        tags:
            # normal versions
            - 'v[0-9]+.[0-9]+.[0-9]+'
            # pre-releases
            - 'v[0-9]+.[0-9]+.[0-9]+-**'
    pull_request: {}

# Cancel previous PR/branch runs when a new commit is pushed
concurrency:
    group: ${{ github.ref }}
    cancel-in-progress: true

jobs:
    # Performs quick checks before the expensive test runs
    check-and-lint:
        if: contains(github.event.head_commit.message, '[skip ci]') == false

        runs-on: ubuntu-latest

        steps:
            - uses: ioBroker/testing-action-check@v2
              with:
                  node-version: '22.x'
                  # Uncomment the following line if your adapter cannot be installed using 'npm ci'
                  # install-command: 'npm install'
                  lint: true

    # Runs adapter tests on all supported node versions and OSes
    adapter-tests:
        needs: check-and-lint
        if: contains(github.event.head_commit.message, '[skip ci]') == false

        runs-on: ${{ matrix.os }}
        strategy:
            matrix:
                node-version: [22.x, 24.x]
                os: [ubuntu-latest, windows-latest, macos-latest]

        steps:
            - uses: ioBroker/testing-action-adapter@v1
              with:
                  node-version: ${{ matrix.node-version }}
                  os: ${{ matrix.os }}
                  # Uncomment the following line if your adapter cannot be installed using 'npm ci'
                  # install-command: 'npm install'

    # Deploys the final package to NPM using npm Trusted Publishing (OIDC) -
    # no NPM_TOKEN secret needed/used. Requires a trusted publisher configured
    # for this package at https://www.npmjs.com/package/iobroker.zeptrion/access
    # (organization "bueste", repository "ioBroker.zeptrion",
    # workflow filename "test-and-release.yml").
    deploy:
        needs: [check-and-lint, adapter-tests]

        # Trigger this step only when a commit on any branch is tagged with a version number
        if: |
            contains(github.event.head_commit.message, '[skip ci]') == false &&
            github.event_name == 'push' &&
            startsWith(github.ref, 'refs/tags/v')

        runs-on: ubuntu-latest

        # id-token: write is required for npm Trusted Publishing (OIDC).
        # contents: write is required to create GitHub releases.
        permissions:
            id-token: write
            contents: write

        steps:
            - uses: ioBroker/testing-action-deploy@v1
              with:
                  node-version: '22.x'
                  # Uncomment the following line if your adapter cannot be installed using 'npm ci'
                  # install-command: 'npm install'
                  # npm-token intentionally omitted: this package uses npm Trusted Publishing (OIDC)
                  # instead of a long-lived NPM_TOKEN secret.
                  github-token: ${{ secrets.GITHUB_TOKEN }}
